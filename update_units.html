","name":"嬰兒室","campus":"斗六"},{"code":"YI2A","name":"2AICU","campus":"斗六"},{"code":"YI2B","name":"2BICU","campus":"斗六"},{"code":"YLDH","name":"12W","campus":"斗六"},{"code":"YRCC","name":"RCC","campus":"斗六"},{"code":"YT7B","name":"7B負壓隔離病房","campus":"斗六"},{"code":"Z030","name":"居家護理","campus":"斗六"},{"code":"HBMT","name":"骨髓移植中心","campus":"虎尾"},{"code":"HCSR","name":"供應室","campus":"虎尾"},{"code":"HDEN","name":"牙科","campus":"虎尾"},{"code":"HDER","name":"皮膚","campus":"虎尾"},{"code":"HDIA","name":"洗腎室","campus":"虎尾"},{"code":"HEME","name":"急診","campus":"虎尾"},{"code":"HENT","name":"耳鼻喉","campus":"虎尾"},{"code":"HLAB","name":"檢驗醫學部","campus":"虎尾"},{"code":"HLAR","name":"檢驗醫學部","campus":"虎尾"},{"code":"HMAC","name":"整型美容中心","campus":"虎尾"},{"code":"HMED","name":"一般內科","campus":"虎尾"},{"code":"HMOC","name":"腫瘤醫學中心","campus":"虎尾"},{"code":"HNE1","name":"神經檢查室","campus":"虎尾"},{"code":"HNEU","name":"神經內科","campus":"虎尾"},{"code":"HOBG","name":"婦產科","campus":"虎尾"},{"code":"HOPH","name":"眼科","campus":"虎尾"},{"code":"HOR","name":"開刀房","campus":"虎尾"},{"code":"HORT","name":"骨科門診","campus":"虎尾"},{"code":"HPC","name":"麻醉部","campus":"虎尾"},{"code":"HPED","name":"小兒科門診","campus":"虎尾"},{"code":"HPMC","name":"精準醫學中心","campus":"虎尾"},{"code":"HPMO","name":"復健科門診","campus":"虎尾"},{"code":"HPMR","name":"復健部","campus":"虎尾"},{"code":"HRAD","name":"影醫部","campus":"虎尾"},{"code":"HRT1","name":"放射腫瘤科","campus":"虎尾"},{"code":"HRT2","name":"腫瘤內科","campus":"虎尾"},{"code":"HSUR","name":"外科","campus":"虎尾"},{"code":"HUR","name":"尿動室","campus":"虎尾"},{"code":"HURO","name":"泌尿科","campus":"虎尾"},{"code":"HZ03","name":"居家護理","campus":"虎尾"},{"code":"YH5N","name":"5N","campus":"虎尾"},{"code":"YH5S","name":"5S","campus":"虎尾"},{"code":"YH6N","name":"6N","campus":"虎尾"},{"code":"YH6S","name":"6S","campus":"虎尾"},{"code":"YH7N","name":"7N","campus":"虎尾"},{"code":"YHBS","name":"碎石室","campus":"虎尾"},{"code":"YHCR","name":"化療室","campus":"虎尾"},{"code":"YHES","name":"內視鏡室","campus":"虎尾"},{"code":"YI3N","name":"3N","campus":"虎尾"}];

function log(msg, color='#a8d8a8') {
  const el = document.getElementById('log');
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct, label) {
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = label;
}

async function runUpdate() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '更新中...';
  try {
    log('▶ 更新 ' + UNITS_UPDATE.length + ' 個醫療單位名稱及院區...', '#f5c75a');
    for (let i = 0; i < UNITS_UPDATE.length; i += 400) {
      const batch = writeBatch(db);
      UNITS_UPDATE.slice(i, i+400).forEach(u => {
        batch.set(doc(db, 'units', u.code), u);
      });
      await batch.commit();
      const done = Math.min(i+400, UNITS_UPDATE.length);
      setProgress(done/UNITS_UPDATE.length*100, done + '/' + UNITS_UPDATE.length);
      log('  ' + done + '/' + UNITS_UPDATE.length + ' 完成', '#a8d8a8');
    }
    setProgress(100, '更新完成！');
    log('', '');
    log('🎉 全部更新成功！', '#f5c75a');
    log('請回到主系統確認單位名稱是否正確。', '#a8d8a8');
    document.getElementById('btn').textContent = '✅ 更新完成';
  } catch(e) {
    log('❌ 錯誤：' + e.message, '#f5a0a0');
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = '重新嘗試';
  }
}
window.runUpdate = runUpdate;
</script>

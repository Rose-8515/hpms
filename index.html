// ══════════════════════════════════════
// FIRESTORE HELPERS
// ══════════════════════════════════════
async function fsGetAll(col, ...constraints) {
  const q = constraints.length ? query(collection(db, col), ...constraints) : collection(db, col);
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ _id: d.id, ...d.data() }));
}
async function fsGet(col, id) {
  const snap = await getDoc(doc(db, col, id));
  return snap.exists() ? { _id: snap.id, ...snap.data() } : null;
}
async function fsSet(col, id, data) {
  await setDoc(doc(db, col, id), data, { merge: true });
}
async function fsAdd(col, data) {
  const ref = await addDoc(collection(db, col), data);
  return ref.id;
}
async function fsUpdate(col, id, data) {
  await updateDoc(doc(db, col, id), data);
}
async function fsDelete(col, id) {
  await deleteDoc(doc(db, col, id));
}
async function fsBatch(ops) {
  const batch = writeBatch(db);
  ops.forEach(op => {
    if (op.type === 'set') batch.set(doc(db, op.col, op.id), op.data, { merge: true });
    else if (op.type === 'delete') batch.delete(doc(db, op.col, op.id));
  });
  await batch.commit();
}

// UNIT DROPDOWN HELPER (兩層：院區 → 單位)
// ══════════════════════════════════════
// allUnits: 全部單位資料 (需在呼叫前已載入)
// campusSelId: 院區 select 的 id
// unitSelId:   單位 select 的 id
// onUnitChange: 選完單位後的 callback (可選)
function buildCampusUnitSelects(allUnits, campusSelId, unitSelId, onUnitChange='') {
  const campuses = [...new Set(allUnits.map(u=>u.campus).filter(Boolean))].sort();
  const campusOpts = `<option value="">-- 請選擇院區 --</option>` +
    campuses.map(c=>`<option value="${c}">${c}院區</option>`).join('') +
    (allUnits.some(u=>!u.campus) ? '<option value="__other__">其他</option>' : '');
  return { campusOpts, campuses, allUnits };
}

function onCampusChange(campusSelId, unitSelId, allUnits, extraOnChange='') {
  const campus = document.getElementById(campusSelId).value;
  const unitSel = document.getElementById(unitSelId);
  const filtered = campus === '__other__'
    ? allUnits.filter(u=>!u.campus)
    : campus ? allUnits.filter(u=>u.campus===campus) : [];
  filtered.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
  unitSel.innerHTML = '<option value="">-- 請選擇單位 --</option>' +
    filtered.map(u=>`<option value="${u.code}">${u.name} (${u.code})</option>`).join('');
  if(extraOnChange) eval(extraOnChange);
}
window.onCampusChange = onCampusChange;

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!id || !pw) { err.textContent = '請輸入員工號及密碼'; return; }
  showLoading('驗證中...');
  try {
    const u = await fsGet('users', id);
    hideLoading();
    if (!u || u.pw !== pw) { err.textContent = '員工號或密碼錯誤'; return; }
    CU = u;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('tb-name').textContent = CU.name;
    document.getElementById('tb-role').textContent = RL[CU.role] || CU.role;
    document.getElementById('tb-role').style.background = RC[CU.role] || '#666';
    buildSidebar(); navigate('dashboard');
  } catch(e) { hideLoading(); err.textContent = '連線失敗：' + e.message; }
}
window.doLogin = doLogin;

function doLogout() {

let _dbData = null; // cache
let _dbMonth = null; // current viewing month

async function renderDashboard() {
  const now = new Date();
  if (!_dbMonth) _dbMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  renderMain('<div style="padding:40px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>');
  try {
    if (!_dbData) {
      const [units, drugs, audits, ud] = await Promise.all([
        fsGetAll('units'), fsGetAll('drugs'), fsGetAll('audits'), fsGetAll('unit_drugs'),
      ]);
      units.sort((a,b) => a.campus.localeCompare(b.campus) || a.name.localeCompare(b.name,'zh-TW'));
      _dbData = { units, drugs, audits, ud };
    }
    renderDashboardUI();
  } catch(e) { renderMain(`<div class="alert alert-warn">載入失敗：${e.message}</div>`); }
}

function renderDashboardUI() {
  const { units, drugs, audits, ud } = _dbData;
  const cm = {}; ud.forEach(r => { cm[r.unitCode] = (cm[r.unitCode]||0)+1; });

  // Month navigation
  const [y, m] = _dbMonth.split('-').map(Number);
  const prevMonth = m===1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  const nextMonth = m===12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`;
  const monthLabel = `${y}年${m}月`;
  const now = new Date();
  const isCurrentMonth = _dbMonth === now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  // Units with drug list
  const activeUnits = units.filter(u => cm[u.code] > 0);
  const totalUnits = activeUnits.length;

  // Audits in selected month
  const monthAudits = audits.filter(a => a.auditDate?.startsWith(_dbMonth));
  // Dedupe by unit (latest per unit per month)
  const auditedUnits = new Set(monthAudits.map(a => a.unitCode));
  const completedCount = auditedUnits.size;
  const pct = totalUnits > 0 ? Math.round(completedCount/totalUnits*100) : 0;

  // Recent 3 months for summary cards
  const months = [];
  for (let i = 2; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label = `${d.getFullYear()}年${d.getMonth()+1}月`;
    const mAudits = audits.filter(a => a.auditDate?.startsWith(key));
    const mDone = new Set(mAudits.map(a=>a.unitCode)).size;
    months.push({ key, label, done: mDone, total: totalUnits, isCurrent: key===_dbMonth });
  }

  // Unit completion detail for selected month
  const campuses = [...new Set(activeUnits.map(u=>u.campus).filter(Boolean))].sort();

  renderMain(`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><h2 style="font-size:22px;font-weight:700;color:var(--primary-dark)">📊 儀表板</h2>
    <p style="font-size:13px;color:var(--text-light)">歡迎回來，${CU.name}</p></div>
    <button class="btn btn-ghost btn-sm" onclick="_dbData=null;renderDashboard()">🔄 重新整理</button>
  </div>

  <!-- Month summary cards -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
    ${months.map(mo=>`
    <div onclick="_dbMonth='${mo.key}';renderDashboardUI()" style="background:${mo.isCurrent?'var(--primary)':'var(--card)'};color:${mo.isCurrent?'#fff':'var(--text)'};border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;border:2px solid ${mo.isCurrent?'var(--primary)':'var(--border)'};transition:all 0.15s">
      <div style="font-size:12px;opacity:0.75;margin-bottom:4px">${mo.label}</div>
      <div style="font-size:28px;font-weight:800">${mo.done} <span style="font-size:14px;font-weight:400">/ ${mo.total} 單位</span></div>
      <div style="margin-top:8px;background:rgba(255,255,255,0.25);border-radius:4px;height:6px;overflow:hidden">
        <div style="height:100%;background:${mo.isCurrent?'#fff':'var(--success)'};width:${mo.total>0?Math.round(mo.done/mo.total*100):0}%;border-radius:4px;transition:width 0.5s"></div>
      </div>
      <div style="font-size:11px;margin-top:4px;opacity:0.8">${mo.total>0?Math.round(mo.done/mo.total*100):0}% 完成</div>
    </div>`).join('')}
  </div>

  <!-- Month detail -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--bg)">
      <div style="font-size:16px;font-weight:700;color:var(--primary)">📋 ${monthLabel} 查核明細</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-ghost btn-sm" onclick="_dbMonth='${prevMonth}';renderDashboardUI()">‹ 上月</button>
        <span style="font-size:13px;font-weight:600;color:var(--primary-dark)">${completedCount}/${totalUnits} 單位完成（${pct}%）</span>
        <button class="btn btn-ghost btn-sm" ${isCurrentMonth?'disabled style="opacity:0.4"':''} onclick="_dbMonth='${nextMonth}';renderDashboardUI()">下月 ›</button>
      </div>
    </div>

    <!-- Progress bar -->
    <div style="background:var(--bg);border-radius:6px;height:10px;margin-bottom:16px;overflow:hidden">
      <div style="height:100%;background:linear-gradient(90deg,var(--primary),var(--success));width:${pct}%;border-radius:6px;transition:width 0.5s"></div>
    </div>

    ${campuses.map(campus => {
      const campusUnits = activeUnits.filter(u=>u.campus===campus);
      return `
      <div style="margin-bottom:18px">
        <div style="font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:4px 10px;background:var(--bg);border-radius:4px">${campus}院區</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
          ${campusUnits.map(u => {
            const done = auditedUnits.has(u.code);
            const lastAudit = monthAudits.filter(a=>a.unitCode===u.code).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))[0];
            return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid ${done?'#a8dfc0':'var(--border)'};background:${done?'#f0faf5':'#fff'}">
              <span style="font-size:18px">${done?'✅':'⬜'}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.name}</div>
                <div style="font-size:11px;color:var(--text-light)">${done ? (lastAudit?.auditDate||'') + ' · ' + (lastAudit?.pharmacistName||lastAudit?.pharmacist||'') : '未查核'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}

    ${activeUnits.filter(u=>!u.campus).length > 0 ? `
    <div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px">其他</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
        ${activeUnits.filter(u=>!u.campus).map(u => {
          const done = auditedUnits.has(u.code);
          return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid ${done?'#a8dfc0':'var(--border)'};background:${done?'#f0faf5':'#fff'}">
            <span>${done?'✅':'⬜'}</span>
            <div><div style="font-size:13px;font-weight:600">${u.name}</div>

}

function upAudit(i,f,v) {
  if(f==='actual') {
    AS.items[i].actual = parseInt(v)||0;
    checkExcess(i);
  } else if(f==='exp') AS.items[i].expOk=v==='ok';
  else if(f==='loc') AS.items[i].locOk=v==='ok';
  else if(f==='note') {
    AS.items[i].note = v;
    checkExcess(i); // re-validate when note changes
  }
}
function checkExcess(i) {
  const item = AS.items[i];
  const isExcess = item.actual > item.baseQty;
  const actualEl = document.getElementById('actual-'+i);
  const noteEl = document.getElementById('note-'+i);
  const warnEl = document.getElementById('note-warn-'+i);
  if (!actualEl || !noteEl || !warnEl) return;
  if (isExcess) {
    actualEl.style.border = '2px solid #e67e22';
    actualEl.style.background = '#fdf0e0';
    noteEl.style.border = '2px solid #c0392b';
    noteEl.style.background = '#fde8e6';
    noteEl.placeholder = '⚠️ 請填寫超量原因';
    warnEl.style.display = 'block';
  } else {
    actualEl.style.border = '1px solid #ccc';
    actualEl.style.background = '';
    noteEl.style.border = '1px solid #ccc';
    noteEl.style.background = '';
    noteEl.placeholder = '備註';
    warnEl.style.display = 'none';
  }
}
window.upAudit = upAudit;
window.checkExcess = checkExcess;

function initSig(name) {
  const c = document.getElementById('sig-'+name); if(!c) return;
  const ctx = c.getContext('2d'); let drawing = false;
  c.addEventListener('mousedown', e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);});
  c.addEventListener('mousemove', e=>{if(!drawing)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();SP[name]=c.toDataURL();document.getElementById('sig-'+name+'-status').textContent='已簽名';});
  c.addEventListener('mouseup', ()=>drawing=false); c.addEventListener('mouseleave',()=>drawing=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const r=c.getBoundingClientRect();ctx.beginPath();ctx.moveTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const r=c.getBoundingClientRect();ctx.lineTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);ctx.stroke();SP[name]=c.toDataURL();document.getElementById('sig-'+name+'-status').textContent='已簽名';},{passive:false});
  c.addEventListener('touchend',()=>drawing=false);
}
function clearSig(name) {
  const c=document.getElementById('sig-'+name); if(!c)return;
  c.getContext('2d').clearRect(0,0,c.width,c.height); SP[name]=null;
  document.getElementById('sig-'+name+'-status').textContent='未簽名';
}
window.clearSig = clearSig;

function validateUnitHeadId(input) {
  const val = input.value.toUpperCase();
  input.value = val;
  const status = document.getElementById('unit-head-id-status');
  const pattern = /^Y\d{5}$/;
  if (!val) { status.textContent = ''; status.style.color = '#5a7085'; return; }
  if (pattern.test(val)) {
    status.textContent = '✅ 格式正確';
    status.style.color = '#27ae60';
  } else {
    status.textContent = '⚠️ 格式應為 Y+5碼數字';
    status.style.color = '#e67e22';
  }
}
window.validateUnitHeadId = validateUnitHeadId;

async function saveAudit() {
  showLoading('儲存至雲端...');
  try {
    const unitHeadId = document.getElementById('unit-head-id')?.value||'';
    if (!unitHeadId) {
      hideLoading(); alert('請填寫單位負責人員工號'); 
      document.getElementById('unit-head-id').focus(); return;
    }
    if (!/^Y\d{5}$/.test(unitHeadId)) {
      hideLoading(); alert('單位負責人員工號格式錯誤，請填寫 Y+5碼數字（如 Y09999）');
      document.getElementById('unit-head-id').focus(); return;
    }
    if (!SP['unit']) {
      hideLoading(); alert('請完成單位負責人手寫簽名');
      document.getElementById('sig-unit').scrollIntoView({behavior:'smooth'}); return;
    }
    // Check all excess items have notes
    const missingNote = AS.items.filter(item => item.actual > item.baseQty && !item.note.trim());
    if (missingNote.length > 0) {
      hideLoading();
      const names = missingNote.map(item => item.name.substring(0,20)+'...').join('\n');
      alert('以下品項實際庫存量超過基本常備量，請填寫備註說明原因：\n\n' + names);
      // Highlight missing note fields
      AS.items.forEach((item,i) => {
        if(item.actual > item.baseQty && !item.note.trim()) {
          const noteEl = document.getElementById('note-'+i);
          if(noteEl) { noteEl.style.border='2px solid #c0392b'; noteEl.focus(); }
        }
      });
      return;
    }
    await fsAdd('audits', {
      unitCode: AS.unit.code, unitName: AS.unit.name, auditDate: AS.date,
      pharmacistName: CU.name, pharmacistId: CU.id, items: AS.items,
      unitHeadId: unitHeadId||'', unitSig: SP['unit']||null,
      complete: true, createdAt: Date.now()
    });
    hideLoading(); _dbData = null; alert('✅ 查核記錄已儲存至雲端！');
  } catch(e) { hideLoading(); alert('儲存失敗：'+e.message); }
}
window.saveAudit = saveAudit;

function exportAuditRecords() {
  const records = window._arRecords||[];
  if(!records.length){alert('請先執行查詢');return;}
  const rows = [['查核日期','醫療單位','查核藥師','藥師員工號','負責人員工號','品項數','狀態']];
  records.forEach(r=>{
    rows.push([r.auditDate||'', r.unitName||r.unitCode||'', r.pharmacistName||r.pharmacist||'',
      r.pharmacistId||'', r.unitHeadId||'', (r.items||[]).length, r.complete?'完成':'進行中']);

let CD = [];
function renderCompare() {
  renderMain(`
  <div class="page-header"><h2>📋 請領比對</h2><p>匯入請領 XLS 檔案，自動比對品項及常備量</p></div>
  <div class="card">
    <div class="card-title">匯入請領記錄</div>
    <div class="alert alert-info">支援格式：從系統匯出的 .xls / .xlsx 檔案（欄位：領單號碼、收藥部門、庫存碼、商品名、核發數量）</div>
    <div class="upload-zone" onclick="document.getElementById('xls-up').click()">
      <div class="icon">📂</div><div>點擊或拖放 XLS 檔案至此處</div>
      <div class="text-sm mt-2">Receive_Report_xxxx.xls</div>
    </div>
    <input type="file" id="xls-up" accept=".xls,.xlsx" class="hidden" onchange="loadXLS(this)"/>
  </div>
  <div id="compare-result"></div>`);
  const dz = document.querySelector('.upload-zone');
  dz.addEventListener('dragover', e=>{e.preventDefault();dz.style.background='#e8f0fe';});
  dz.addEventListener('dragleave', ()=>dz.style.background='');
  dz.addEventListener('drop', e=>{e.preventDefault();dz.style.background='';if(e.dataTransfer.files[0])handleXLS(e.dataTransfer.files[0]);});
}
window.renderCompare = renderCompare;

function loadXLS(input) { if(input.files[0]) handleXLS(input.files[0]); }
window.loadXLS = loadXLS;

function handleXLS(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const bytes = new Uint8Array(e.target.result);
      let rows = [];
      let text = '';
      try { text = new TextDecoder('big5').decode(bytes); } catch { text = new TextDecoder('utf-8').decode(bytes); }
      if (text.includes('\t')) {
        const lines = text.trim().split('\n');
        const header = lines[0].split('\t').map(h=>h.trim().replace(/^="|"$/g,''));
        rows = lines.slice(1).filter(l=>l.trim()).map(l=>{
          const cols = l.split('\t').map(c=>c.trim().replace(/^="|"$/g,''));
          const obj={}; header.forEach((h,i)=>obj[h]=cols[i]||''); return obj;
        });
      } else {
        const wb = XLSX.read(bytes,{type:'array'});
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      }
      await processCompare(rows);
    } catch(ex) { alert('檔案讀取失敗：'+ex.message); }
  };
  reader.readAsArrayBuffer(file);
}

async function processCompare(rows) {
  showLoading('從雲端載入清單進行比對...');
  try {
    const [udRows, drugs, units] = await Promise.all([
      fsGetAll('unit_drugs'),
      fsGetAll('drugs'),
      fsGetAll('units'),
    ]);
    hideLoading();
    const udMap = {};
    udRows.forEach(r => { if(!udMap[r.unitCode]) udMap[r.unitCode]={}; udMap[r.unitCode][r.drugCode]=r.baseQty; });
    const dMap = Object.fromEntries(drugs.map(d=>[d.code,d.name]));
    const uMap = Object.fromEntries(units.map(u=>[u.code,u.name]));
    // 每筆領單獨立一列比對
    CD = [];
    rows.forEach(r => {
      const dept=(r['收藥部門']||'').trim();
      const code=(r['庫存碼']||'').trim();
      const qty=parseFloat(r['核發數量']||'0')||0;
      const name=(r['商品名']||'').trim();
      const rawOrder=(r['領單號碼']||'').toString().trim();
      const orderNo=rawOrder.replace(/^=?"?/,'').replace(/"$/,'');
      if(!dept||!code) return;
      const ul=udMap[dept]||{};
      const un=uMap[dept]||dept;
      const bq=ul[code];
      const status=bq===undefined?'missing':qty>bq?'excess':'ok';
      CD.push({dept, unitName:un, code, name:name||dMap[code]||code, qty, baseQty:bq??'—', status, orderNos:orderNo});
    });
    // 排序：未備有 → 超量 → 正常
    const statusOrder = {missing:0, excess:1, ok:2};
    CD.sort((a,b) => statusOrder[a.status] - statusOrder[b.status]);
    const missing=CD.filter(r=>r.status==='missing').length;
    const excess=CD.filter(r=>r.status==='excess').length;
    const ok=CD.filter(r=>r.status==='ok').length;
    document.getElementById('compare-result').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="val">${CD.length}</div><div class="lbl">比對總筆數</div></div>
      <div class="stat-card red"><div class="val">${missing}</div><div class="lbl">⚠️ 未備有</div></div>
      <div class="stat-card orange"><div class="val">${excess}</div><div class="lbl">⚠️ 超過常備量</div></div>
      <div class="stat-card green"><div class="val">${ok}</div><div class="lbl">✅ 正常</div></div>
    </div>
    <div class="card">
      <div class="card-title">比對結果</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-success btn-sm" onclick="exportCompare()">📥 匯出Excel</button>
        <span class="text-sm" style="align-self:center">🔴 未備有（清單無此品項）　🟠 超過常備量　✅ 正常</span>
      </div>
      <div class="tbl-wrap"><table>
        <tr><th>領單號碼</th><th>收藥部門</th><th>單位名稱</th><th>庫存碼</th><th>藥品名稱</th><th>核發數量</th><th>常備量基準</th><th>狀態</th></tr>
        ${CD.map(r=>`<tr class="${r.status==='missing'?'row-missing':r.status==='excess'?'row-excess':'row-ok'}">
          <td style="font-size:11px;color:#5a7085">${r.orderNos||'—'}</td>
          <td>${r.dept}</td><td>${r.unitName}</td><td>${r.code}</td>
          <td style="font-size:12px">${r.name}</td>
          <td style="text-align:center">${r.qty}</td><td style="text-align:center">${r.baseQty}</td>
          <td><span class="badge-${r.status==='missing'?'red':r.status==='excess'?'orange':'green'}">${r.status==='missing'?'未備有':r.status==='excess'?'超量':'正常'}</span></td>
        </tr>`).join('')}
      </table></div>
    </div>`;
  } catch(e) { hideLoading(); alert('比對失敗：'+e.message); }
}

function exportCompare() {
  if(!CD.length) return;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['收藥部門','單位名稱','庫存碼','藥品名稱','核發數量','常備量基準','狀態'],
    ...CD.map(r=>[r.dept,r.unitName,r.code,r.name,r.qty,r.baseQty,r.status==='missing'?'未備有':r.status==='excess'?'超量':'正常'])
  ]),'請領比對');
  XLSX.writeFile(wb,`請領比對_${new Date().toISOString().slice(0,10)}.xlsx`);
}
window.exportCompare = exportCompare;

.stat-card.green{border-left-color:var(--success);}.stat-card.green .val{color:var(--success);}

.upload-zone:hover{border-color:var(--primary-light);background:#f0f6ff;color:var(--primary);}
.upload-zone .icon{font-size:36px;margin-bottom:8px;}
.row-missing td{background:#fde8e6!important;}.row-excess td{background:#fdf0e0!important;}.row-ok td{background:#f0faf5!important;}
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-overlay p{font-size:14px;color:var(--text-light);}
.hidden{display:none!important;}
.mt-2{margin-top:8px;}.mb-2{margin-bottom:8px;}
.text-sm{font-size:12px;color:var(--text-light);}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;}
.alert-info{background:#e6f0fb;color:var(--primary);border:1px solid #aac8ef;}
.alert-warn{background:#fdf0e0;color:var(--warning);border:1px solid #f5c875;}
@media print{#login-screen,#topbar,#sidebar,.no-print{display:none!important;}#main{padding:0;max-width:100%;}body{background:#fff;}.card{box-shadow:none;border:1px solid #ccc;}}
</style>

function log(msg, color='#a8d8a8') {
  const el = document.getElementById('log');
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}
function setProgress(pct, label) {
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = label;
}

async function runImport() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '匯入中...';
  try {
    const total = DRUGS.length + UNITS.length + UD.length;
    let done = 0;

    log('▶ 匯入藥品資料庫（' + DRUGS.length + ' 筆）...', '#f5c75a');
    for (let i = 0; i < DRUGS.length; i += 400) {
      const batch = writeBatch(db);
      DRUGS.slice(i, i+400).forEach(d => batch.set(doc(db,'drugs',d.code), d));
      await batch.commit();
      done += Math.min(400, DRUGS.length - i);
      setProgress(done/total*100, '藥品 ' + Math.min(i+400,DRUGS.length) + '/' + DRUGS.length);
    }
    log('  ✅ 藥品完成', '#a8d8a8');

    log('▶ 匯入醫療單位（' + UNITS.length + ' 筆）...', '#f5c75a');
    for (let i = 0; i < UNITS.length; i += 400) {
      const batch = writeBatch(db);
      UNITS.slice(i, i+400).forEach(u => batch.set(doc(db,'units',u.code), u));
      await batch.commit();
      done += Math.min(400, UNITS.length - i);
      setProgress(done/total*100, '單位 ' + Math.min(i+400,UNITS.length) + '/' + UNITS.length);
    }
    log('  ✅ 單位完成', '#a8d8a8');

    log('▶ 匯入不計價清單（' + UD.length + ' 筆）...', '#f5c75a');
    for (let i = 0; i < UD.length; i += 400) {
      const batch = writeBatch(db);
      UD.slice(i, i+400).forEach(r => {
        batch.set(doc(db,'unit_drugs', r.unitCode+'_'+r.drugCode), r);
      });
      await batch.commit();
      done += Math.min(400, UD.length - i);
      setProgress(done/total*100, '清單 ' + Math.min(i+400,UD.length) + '/' + UD.length);
    }
    log('  ✅ 清單完成', '#a8d8a8');

    setProgress(100, '全部完成！');
    log('', '');
    log('🎉 匯入成功！共匯入：', '#f5c75a');
    log('  • 藥品：' + DRUGS.length + ' 種', '#a8d8a8');
    log('  • 醫療單位：' + UNITS.length + ' 個', '#a8d8a8');
    log('  • 不計價清單：' + UD.length + ' 筆', '#a8d8a8');
    log('', '');
    log('請回到系統補充各單位中文名稱及院區。', '#f5c75a');
    document.getElementById('btn').textContent = '✅ 匯入完成';
  } catch(e) {
    log('❌ 錯誤：' + e.message, '#f5a0a0');
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = '重新嘗試';
  }
}
window.runImport = runImport;
